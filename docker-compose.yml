version: '3.9'

# ============================================================
# Autonomous Business v3 — Production Deployment
# 4 containers: postgres, redis, paperclip (optional), gateway
# All 22 agent roles run as CRON tasks against the Hermes gateway
# ============================================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: company-postgres
    environment:
      POSTGRES_DB: company
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes123
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d company"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - company-net
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: company-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - company-net
    deploy:
      resources:
        limits:
          memory: 256M

  # Paperclip — org scheduler & issue routing (optional, can run without)
  paperclip:
    image: ghcr.io/paperclip-ai/paperclip:latest
    container_name: company-paperclip
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgresql://hermes:hermes123@postgres:5432/company
      REDIS_URL: redis://redis:6379
      PAPERCLIP_SECRET: hermes_secret_key_change_me
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - paperclip-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - company-net
    deploy:
      resources:
        limits:
          memory: 1G
    profiles:
      - scheduler   # Only starts with: docker-compose --profile scheduler up

networks:
  company-net:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  paperclip-data:
