    command: hermes chat --config /etc/hermes/workers/ceo/config.yaml --session /var/hermes/sessions/ceo --adapter paperclip --heartbeat
    environment:
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      PAPERCLIP_API_URL: http://paperclip:3100/api
    volumes:
      - hermes-sessions:/var/hermes/sessions
      - ./worker-configs/ceo:/etc/hermes/workers/ceo:ro
