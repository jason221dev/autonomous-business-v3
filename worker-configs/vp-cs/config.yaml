model:
  provider: minimax
  name: MiniMax-M2.5
  max_tokens: 16000
  temperature: 0.5
toolsets:
  - terminal
  - file
  - web
  - session_search
session:
  persist: true
  resume: true
skills:
  - plan
  - notion
  - github-issues
  - google-workspace
heartbeat:
  interval_minutes: 15
  timeout_seconds: 180
