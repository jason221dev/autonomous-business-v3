model:
  provider: minimax
  name: MiniMax-M2.5
  max_tokens: 12000
  temperature: 0.3
toolsets:
  - terminal
  - file
  - web
  - session_search
session:
  persist: true
  resume: true
skills:
  - weights-and-biases
  - google-workspace
  - notion
  - plan
heartbeat:
  interval_minutes: 20
  timeout_seconds: 180
