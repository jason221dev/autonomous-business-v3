model:
  provider: minimax
  name: MiniMax-Text-01
  max_tokens: 32000
  temperature: 0.7
toolsets:
  - terminal
  - file
  - web
  - git
  - session_search
  - mcp
session:
  persist: true
  resume: true
skills:
  - github-pr-workflow
  - github-issues
  - github-repo-management
  - plan
  - writing-plans
  - subagent-driven-development
  - systematic-debugging
  - memory
heartbeat:
  interval_minutes: 15
  timeout_seconds: 300
