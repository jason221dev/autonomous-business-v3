model:
  provider: minimax
  name: MiniMax-M2.5
  max_tokens: 16000
  temperature: 0.6
toolsets:
  - terminal
  - file
  - web
  - session_search
session:
  persist: true
  resume: true
skills:
  - plan
  - xurl
  - blogwatcher
  - notion
  - google-workspace
heartbeat:
  interval_minutes: 20
  timeout_seconds: 200
